spring.application.name=oneToOne
# CẤU HÌNH SERVER

server.port=8080

# CẤU HÌNH KẾT NỐI DATABASE

spring.datasource.url=jdbc:mysql://localhost:3306/QuanLySinhVien

# Tên đăng nhập (mặc định là root)
spring.datasource.username=root

# Mật khẩu (nhập đúng mật khẩu đã đặt khi cài MySQL)
spring.datasource.password=1234

# Driver class (MySQL 8 dùng driver này)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
